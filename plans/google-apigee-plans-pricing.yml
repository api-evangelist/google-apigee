specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Google Apigee
providerId: google-apigee
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Gateway
  - API Management
  - Enterprise
  - Google Cloud
description: Apigee is offered in two commercial shapes - a Pay-as-you-go (PAYG) model billed by environment
  size and proxy throughput, and Subscription tiers (Standard / Enterprise / Enterprise Plus) priced via
  Google Cloud sales. Public list prices are not posted; use the Pricing Calculator or contact sales.
  A 60-day evaluation is available to new customers.
sources:
  - https://cloud.google.com/apigee/pricing
  - https://cloud.google.com/apigee/docs/api-platform/get-started/compare-apigee-products
  - https://cloud.google.com/apigee
plans:
  - id: google-apigee-eval
    name: Evaluation (60-day)
    type: freemium
    description: 60-day no-cost evaluation of Apigee with limited deployment scope intended for proof-of-concept.
    entries:
      - label: Evaluation period
        description: Time-bounded free trial
        name: eval_period
        type: subscription
        metric: trial
        limit: 60
        timeFrame: day
        geo: global
        domains:
          - https://apigee.googleapis.com
          - https://apigeeconnect.googleapis.com
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Evaluation organization
      - name: Limited proxies and traffic for POC
      - name: Apigee API
      - name: Apigee Connect API
  - id: google-apigee-payg
    name: Pay-As-You-Go
    type: pay-as-you-go
    description: Pay-as-you-go billing scoped by environment type (Base / Intermediate / Comprehensive).
      Charges accrue hourly per environment plus per-region gateway capacity. List prices vary; use the
      Google Cloud pricing calculator for an exact quote.
    entries:
      - label: Base environment
        description: Hourly charge for a Base environment (up to 20 proxy deployments per region)
        name: env_base
        type: metered
        metric: environment-hour
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://apigee.googleapis.com
        unit: 1
        price: see pricing calculator
        userMultiplied: false
      - label: Intermediate environment
        description: Hourly charge for an Intermediate environment (up to 50 proxy deployments per region)
        name: env_intermediate
        type: metered
        metric: environment-hour
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://apigee.googleapis.com
        unit: 1
        price: see pricing calculator
        userMultiplied: false
      - label: Comprehensive environment
        description: Hourly charge for a Comprehensive environment (up to 100 proxy deployments included
          per region; purchasable up to 6,000)
        name: env_comprehensive
        type: metered
        metric: environment-hour
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://apigee.googleapis.com
        unit: 1
        price: see pricing calculator
        userMultiplied: false
      - label: API call volume
        description: Per-call usage above included gateway capacity
        name: api_calls
        type: metered
        metric: requests
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://apigee.googleapis.com
        unit: 1000000
        price: see pricing calculator
        userMultiplied: false
    elements:
      - name: Apigee API
      - name: Apigee Connect API
      - name: Apigee Hub API
      - name: Hourly billing per environment
      - name: Up to 5 Base + 5 Intermediate + 85 Comprehensive environments per organization
  - id: google-apigee-standard
    name: Subscription - Standard
    type: subscription
    description: Annual subscription for production API management at smaller scale. Pricing not published;
      sold by Google Cloud sales.
    entries:
      - label: Annual subscription
        description: Negotiated annual fee for the Standard tier
        name: subscription
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        domains:
          - https://apigee.googleapis.com
          - https://apihub.googleapis.com
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Production API management
      - name: Subset of advanced features
      - name: Standard SLA
  - id: google-apigee-enterprise
    name: Subscription - Enterprise
    type: subscription
    description: Mid-tier annual subscription with broader environment counts, advanced security, monetization,
      and analytics. Pricing not published.
    entries:
      - label: Annual subscription
        description: Negotiated annual fee for the Enterprise tier
        name: subscription
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        domains:
          - https://apigee.googleapis.com
          - https://apihub.googleapis.com
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: All Standard features
      - name: Advanced API Security add-on eligible
      - name: Monetization
      - name: Higher environment / proxy counts
  - id: google-apigee-enterprise-plus
    name: Subscription - Enterprise Plus
    type: enterprise
    description: Top-tier subscription with the highest deployment ceilings, financially-backed SLAs,
      and dedicated support. Pricing not published.
    entries:
      - label: Annual subscription
        description: Negotiated annual fee for the Enterprise Plus tier
        name: subscription
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        domains:
          - https://apigee.googleapis.com
          - https://apihub.googleapis.com
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: All Enterprise features
      - name: Up to 6,000 proxies per environment
      - name: Financially-backed SLA
      - name: Mission-critical support
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
