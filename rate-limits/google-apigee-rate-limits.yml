specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Google Apigee
providerId: google-apigee
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Gateway
  - API Management
  - Google Cloud
  - Rate Limiting
description: Apigee publishes operational and management-plane limits per environment, organization, and
  project. The data-plane (runtime traffic through your API proxies) is governed by SpikeArrest / Quota
  policies you configure. The numbers below are the platform ceilings that Apigee management APIs and
  default infrastructure enforce.
sources:
  - https://docs.cloud.google.com/apigee/docs/api-platform/reference/limits
  - https://cloud.google.com/apigee/docs/api-platform/reference/limits
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serverError: 500
limits:
  - name: Management API calls (UI/user-initiated)
    scope: organization
    metric: requests_per_minute
    limit: 6000
    timeFrame: minute
  - name: Synchronizer-invoked calls (hybrid)
    scope: organization
    metric: requests_per_minute
    limit: 1000
    timeFrame: minute
  - name: UDCA-invoked calls
    scope: organization
    metric: requests_per_minute
    limit: 6000
    timeFrame: minute
  - name: SpikeArrest policy maximum (per second)
    scope: api-proxy
    metric: requests_per_second
    limit: 4000
    timeFrame: second
    notes: Configured via SpikeArrest policy on the proxy.
  - name: SpikeArrest policy maximum (per minute)
    scope: api-proxy
    metric: requests_per_minute
    limit: 240000
    timeFrame: minute
  - name: Metrics API calls
    scope: organization
    metric: requests_per_minute
    limit: 100
    timeFrame: minute
  - name: Asynchronous query API calls
    scope: organization
    metric: requests_per_day
    limit: 300
    timeFrame: day
  - name: Data Export API calls
    scope: organization
    metric: requests_per_day
    limit: 500
    timeFrame: day
  - name: Debug sessions
    scope: project
    metric: sessions_per_minute
    limit: 100
    timeFrame: minute
  - name: API proxies per environment
    scope: environment
    metric: proxies
    limit: 6000
  - name: Shared flows per environment
    scope: environment
    metric: shared_flows
    limit: 75
  - name: API proxy endpoints per proxy
    scope: api-proxy
    metric: endpoints
    limit: 10
  - name: Flows per proxy
    scope: api-proxy
    metric: flows
    limit: 200
  - name: Buffered request/response size
    scope: request
    metric: bytes
    limit: 31457280
    notes: 30 MB; streaming above 10 MB has performance impact.
  - name: Streamed request/response size
    scope: request
    metric: bytes
    limit: 10485760
    notes: 10 MB recommended ceiling for streamed messages.
  - name: Request/response header size
    scope: request
    metric: bytes
    limit: 61440
    notes: 60 KB.
  - name: Cache value size
    scope: cache-entry
    metric: bytes
    limit: 262144
    notes: 256 KB.
  - name: Items per cache
    scope: cache
    metric: items
    limit: 10000000
  - name: Total KVM items per organization
    scope: organization
    metric: items
    limit: 5000000
  - name: Apps per organization
    scope: organization
    metric: apps
    limit: 1000000
  - name: Developers per organization
    scope: organization
    metric: developers
    limit: 1000000
  - name: API products per organization
    scope: organization
    metric: products
    limit: 5000
  - name: API keys per app
    scope: app
    metric: keys
    limit: 10
policies:
  - name: Quota and SpikeArrest policies
    description: Use the Apigee Quota policy for per-app/product quotas and SpikeArrest for traffic smoothing
      and burst protection at the proxy level. These are configured per API proxy and bind to the documented
      ceilings above.
  - name: Backoff
    description: Honor 429 + Retry-After on the management plane; on the data plane, respond per the SpikeArrest/Quota
      policy configuration.
  - name: Environment sizing controls capacity
    description: PAYG environment type (Base/Intermediate/Comprehensive) determines maximum proxy deployments
      per region (20/50/100 included; up to 6,000 purchasable on Comprehensive).
  - name: Token expiration windows
    description: OAuth access tokens valid 180 seconds to 30 days; refresh tokens 1 day to 2 years; token
      size capped at 2 KB.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
