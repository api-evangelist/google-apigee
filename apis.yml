aid: google-apigee
name: Google Apigee
description: >-
  Google Apigee is a full-lifecycle API management platform offering an API
  gateway, developer portal, analytics, and monetization capabilities for
  enterprise-grade API programs across cloud, on-premise, and hybrid environments.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - API Gateway
  - API Management
  - Enterprise
  - Google Cloud
url: >-
  https://raw.githubusercontent.com/api-evangelist/google-apigee/refs/heads/main/apis.yml
created: '2026-03-18'
modified: '2026-04-28'
specificationVersion: '0.19'
apis:
  - aid: google-apigee:google-apigee
    name: Google Apigee
    description: >-
      Apigee is Google Cloud's API management platform enabling organizations
      to design, secure, publish, analyze, and scale their APIs with advanced
      analytics, developer portal, and monetization features.
    humanURL: https://cloud.google.com/apigee
    tags:
      - API Gateway
      - API Management
      - Google Cloud
    properties:
      - type: Documentation
        url: https://cloud.google.com/apigee/docs
      - type: Getting Started
        url: https://cloud.google.com/apigee/docs/api-platform/get-started/overview
  - aid: google-apigee:google-apigee-management-api
    name: Google Apigee Management API
    description: >-
      The Apigee Management API is a REST API that provides programmatic access
      to all Apigee platform functions, including creating and deploying API
      proxies, managing organizations and environments, configuring API products,
      managing developer apps, and retrieving analytics data. It is the primary
      interface for automating Apigee administration and CI/CD pipelines.
    humanURL: https://cloud.google.com/apigee/docs/reference/apis/apigee/rest
    baseURL: https://apigee.googleapis.com
    tags:
      - Administration
      - API Management
      - Google Cloud
      - REST
    properties:
      - type: Documentation
        url: https://cloud.google.com/apigee/docs/reference/apis/apigee/rest
      - type: Reference
        url: https://cloud.google.com/apigee/docs/reference/apis/apigee/rest/v1/organizations
      - type: Authentication
        url: https://cloud.google.com/apigee/docs/api-platform/system-administration/using-oauth2
      - type: OpenAPI
        url: openapi/openapi.yml
      - type: JSONSchema
        url: json-schema/json-schema.yml
      - type: Change Log
        url: https://cloud.google.com/apigee/docs/release/notes/apigee-release-notes
  - aid: google-apigee:google-apigee-connect-api
    name: Google Apigee Connect API
    description: >-
      The Apigee Connect API enables Apigee hybrid to connect the Apigee
      management plane to the customer-managed runtime plane without requiring
      the runtime plane to have an inbound firewall rule. It allows secure
      outbound-only connectivity from the on-premises or private cloud
      runtime to Google's management services.
    humanURL: https://cloud.google.com/apigee/docs/hybrid/latest/apigee-connect
    baseURL: https://apigeeconnect.googleapis.com
    tags:
      - Administration
      - Connectivity
      - Google Cloud
      - Hybrid
    properties:
      - type: Documentation
        url: https://cloud.google.com/apigee/docs/hybrid/latest/apigee-connect
      - type: Reference
        url: https://cloud.google.com/apigee/docs/reference/apis/apigeeconnect/rest
  - aid: google-apigee:google-apigee-api-hub
    name: Google Apigee API Hub
    description: >-
      Apigee API Hub is a centralized repository and governance platform for
      discovering, managing, and analyzing APIs across an organization. It
      enables teams to register APIs, manage API versions and specifications,
      enforce API standards, and gain visibility into the full API portfolio
      across multiple gateways and environments.
    humanURL: https://cloud.google.com/apigee/docs/apihub/what-is-api-hub
    baseURL: https://apihub.googleapis.com
    tags:
      - API Catalog
      - API Governance
      - API Hub
      - Google Cloud
    properties:
      - type: Documentation
        url: https://cloud.google.com/apigee/docs/apihub/what-is-api-hub
      - type: Getting Started
        url: https://cloud.google.com/apigee/docs/apihub/get-started-api-hub
      - type: Reference
        url: https://cloud.google.com/apigee/docs/reference/apis/apihub/rest
      - type: Change Log
        url: https://cloud.google.com/apigee/docs/apihub/release-notes
  - aid: google-apigee:google-apigee-analytics-api
    name: Google Apigee Analytics API
    description: >-
      The Apigee Analytics API provides access to API usage metrics, traffic
      data, error rates, latency statistics, and custom reports generated by
      the Apigee analytics engine. It allows developers and operations teams
      to query and export analytics data programmatically for custom dashboards
      and business intelligence tooling.
    humanURL: https://cloud.google.com/apigee/docs/api-platform/analytics/use-analytics-api-measure-api-program-performance
    baseURL: https://apigee.googleapis.com
    tags:
      - Analytics
      - API Management
      - Google Cloud
      - Reporting
    properties:
      - type: Documentation
        url: https://cloud.google.com/apigee/docs/api-platform/analytics/use-analytics-api-measure-api-program-performance
      - type: Reference
        url: https://cloud.google.com/apigee/docs/reference/apis/apigee/rest/v1/organizations.environments.analytics.exports
