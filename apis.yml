aid: google-apigee
name: Google Apigee
description: >-
  Google Apigee is a full-lifecycle API management platform that enables
  enterprises to design, secure, deploy, monitor, and scale APIs. Apigee
  provides a programmable API proxy layer with policies for security, rate
  limiting, transformation, and mediation. It supports REST, SOAP, GraphQL, and
  gRPC protocols, and includes advanced analytics, developer portal capabilities,
  and monetization features for building and managing API programs at scale.
