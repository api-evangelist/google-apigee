specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Google Apigee
providerId: google-apigee
publisherName: Google LLC
serviceCategory: API Management
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Management
  - API Gateway
  - Google Cloud
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Apigee: PAYG bills hourly per environment (Base/Intermediate/Comprehensive)
  plus API call volume; subscription tiers (Standard/Enterprise/Enterprise Plus) bill annually with negotiated
  caps. Apigee invoices flow through the standard Google Cloud billing surface so spend appears in the
  Cloud Billing export alongside other GCP services.'
sources:
  - https://cloud.google.com/apigee/pricing
  - https://docs.cloud.google.com/apigee/docs/api-platform/reference/limits
  - https://cloud.google.com/billing/docs
billingModel:
  pricingCategory: Pay-As-You-Go + Subscription
  billingFrequency: Monthly (PAYG) / Annual (Subscription)
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Apigee API Management
  ServiceCategory: API Management
  ProviderName: Google Cloud
  PublisherName: Google LLC
  InvoiceIssuerName: Google LLC
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: environment_hours
    description: Hours that an Apigee environment is provisioned
    unit: environment-hour
    aggregation: sum
    dimensions:
      - environment_type
      - region
      - organization
  - name: api_calls
    description: API calls processed by Apigee proxies
    unit: request
    aggregation: sum
    dimensions:
      - organization
      - environment
      - api_proxy
      - api_product
  - name: gateway_nodes
    description: Provisioned gateway capacity above included environment baseline
    unit: node-hour
    aggregation: sum
    dimensions:
      - region
      - environment
  - name: subscription_fee
    description: Annual subscription seat (Standard / Enterprise / Enterprise Plus)
    unit: contract-year
    aggregation: sum
    dimensions:
      - tier
  - name: advanced_api_security
    description: Advanced API Security add-on volume
    unit: request
    aggregation: sum
    dimensions:
      - environment
  - name: api_hub_usage
    description: API Hub catalog and discovery usage
    unit: request
    aggregation: sum
    dimensions:
      - organization
apis:
  - name: Apigee API
    baseURL: https://apigee.googleapis.com
    serviceName: Apigee API
    serviceCategory: API Management
  - name: Apigee Connect API
    baseURL: https://apigeeconnect.googleapis.com
    serviceName: Apigee Connect API
    serviceCategory: API Management
  - name: Apigee Hub API
    baseURL: https://apihub.googleapis.com
    serviceName: Apigee Hub API
    serviceCategory: API Catalog
principles:
  - name: Visibility
    description: Enable the Cloud Billing detailed export to BigQuery; filter to service `apigee.googleapis.com`
      to see per-environment hourly cost and API call charges. Use Apigee Analytics for proxy-level traffic.
  - name: Allocation
    description: Tag API proxies, products, and environments with org/team labels; pivot the Cloud Billing
      export by these labels to chargeback to consuming product teams.
  - name: Optimization
    description: Right-size environment type (Base vs Intermediate vs Comprehensive); collapse non-prod
      environments outside business hours; cache responses with the ResponseCache policy to cut backend
      and Apigee throughput cost; commit to a Subscription tier when annual run-rate exceeds PAYG break-even.
  - name: Accountability
    description: Assign each Apigee environment and API product to a budget owner; configure Cloud Billing
      budget alerts at 50/80/100% of monthly forecast and route to the owner.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
